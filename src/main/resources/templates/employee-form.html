<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title th:text="${employee.id} != null ? 'Edit Employee' : 'Add Employee'"></title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/mini.css/3.0.1/mini-default.min.css" />
</head>
<body>
<header>
    <h1 th:text="${employee.id} != null ? 'Edit Employee' : 'Add Employee'"></h1>
</header>
<main>
    <form th:action="${employee.id} != null ? @{/employee/update/{id}(id=${employee.id})} : @{/employee/save}" th:object="${employee}" method="post">
        <div class="row">
            <div class="col-sm-12 col-md-6">
                <label for="name">Name</label>
                <input type="text" id="name" th:field="*{name}" placeholder="Enter employee name" required />
            </div>
            <div class="col-sm-12 col-md-6">
                <label for="dept">Department</label>
                <input type="text" id="dept" th:field="*{dept}" placeholder="Enter department" required />
            </div>
        </div>
        <div class="row">
            <div class="col-sm-12 col-md-6">
                <label for="salary">Salary</label>
                <input type="number" step="0.01" id="salary" th:field="*{salary}" placeholder="Enter salary" required />
            </div>
        </div>
        <div class="row">
            <button type="submit" class="primary">Save</button>
            <a class="button" th:href="@{/employee}">Cancel</a>
        </div>
    </form>
</main>
</body>
</html>
