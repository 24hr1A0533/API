<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Employee Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/mini.css/3.0.1/mini-default.min.css" />
</head>
<body>
<header>
    <h1>Employee Management</h1>
</header>
<main>
    <section>
        <a class="button primary" th:href="@{/employee/new}">Add New Employee</a>
    </section>
    <section>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Department</th>
                    <th>Salary</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="employee : ${employees}">
                    <td th:text="${employee.id}"></td>
                    <td th:text="${employee.name}"></td>
                    <td th:text="${employee.dept}"></td>
                    <td th:text="${employee.salary}"></td>
                    <td>
                        <a class="button secondary" th:href="@{/employee/edit/{id}(id=${employee.id})}">Edit</a>
                        <a class="button danger" th:href="@{/employee/delete/{id}(id=${employee.id})}" onclick="return confirm('Delete this employee?');">Delete</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </section>
</main>
</body>
</html>
